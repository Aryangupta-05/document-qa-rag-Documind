services:
  backend:
    build:
      context: ./backend
    container_name: documind-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000/api/v1
    container_name: documind-frontend
    ports:
      - "5174:80"
    depends_on:
      - backend